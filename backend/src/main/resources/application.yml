spring:
  application:
    name: personal-blog-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/personal_blog}
    username: ${SPRING_DATASOURCE_USERNAME:blog_user}
    password: ${SPRING_DATASOURCE_PASSWORD:blog_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

server:
  port: 18080

blog:
  jwt:
    # WARNING: Override JWT_SECRET with a strong secret (32+ chars) in production
    secret: ${JWT_SECRET:dev-secret-do-not-use-in-production-32chars}
    expiration-ms: 86400000  # 24 hours
